<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CarPrice AI | Professional Valuation</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --accent: #6366f1;
            --accent-dark: #4f46e5;
            --bg-gradient: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            --glass: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background: var(--bg-gradient); 
            color: #f8fafc;
            margin: 0;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .dashboard-card {
            width: 90%;
            max-width: 950px;
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 3rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        .header-section { text-align: center; margin-bottom: 3rem; }
        .header-section h1 { font-size: 2.5rem; font-weight: 800; margin: 0; letter-spacing: -1px; }
        .header-section h1 span { color: var(--accent); }
        .header-section p { color: #94a3b8; font-size: 1.1rem; }

        .form-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 2rem;
        }

        .input-wrapper { position: relative; }
        .input-wrapper i {
            position: absolute;
            left: 1rem;
            top: 2.7rem;
            color: var(--accent);
            font-size: 1.1rem;
        }

        label { 
            display: block; 
            margin-bottom: 0.8rem; 
            font-weight: 600; 
            font-size: 0.85rem; 
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #cbd5e1;
        }

        select, input {
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            padding: 1rem 1rem 1rem 3rem;
            color: white;
            width: 100%;
            font-size: 1rem;
            transition: all 0.3s;
            box-sizing: border-box;
        }

        select:focus, input:focus {
            outline: none;
            border-color: var(--accent);
            background: rgba(15, 23, 42, 0.8);
            box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.2);
        }

        .btn-submit {
            grid-column: span 2;
            background: var(--accent);
            color: white;
            padding: 1.2rem;
            border: none;
            border-radius: 14px;
            font-size: 1.1rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 1rem;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
        }

        .btn-submit:hover {
            background: var(--accent-dark);
            transform: translateY(-2px);
            box-shadow: 0 10px 20px -5px rgba(99, 102, 241, 0.5);
        }

        #loading-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(15, 23, 42, 0.9);
            z-index: 1000;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .loader-ring {
            width: 80px; height: 80px;
            border: 5px solid var(--glass-border);
            border-top: 5px solid var(--accent);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        @media (max-width: 768px) {
            .form-grid { grid-template-columns: 1fr; }
            .btn-submit { grid-column: span 1; }
        }
    </style>
</head>
<body>

<div id="loading-overlay">
    <div class="loader-ring"></div>
    <h2 style="margin-top: 20px;">Neural Network Analyzing Market...</h2>
    <p>Cross-referencing {{ result_count }} data points</p>
</div>

<div class="dashboard-card">
    <div class="header-section">
        <h1>CarPrice<span>AI</span> PRO</h1>
        <p>Enterprise-grade vehicle valuation using Gradient Boosting Models</p>
    </div>

    <form action="/predict" method="post" onsubmit="showLoading()">
        <div class="form-grid">
            <div class="input-wrapper">
                <label>Manufacturer</label>
                <i class="fa-solid fa-industry"></i>
                <select name="Make" id="make_select" onchange="updateModels()" required>
                    <option value="">Fetching Brands...</option>
                </select>
            </div>

            <div class="input-wrapper">
                <label>Specific Model</label>
                <i class="fa-solid fa-car"></i>
                <select name="Model" id="model_select" onchange="updatePower()" required disabled>
                    <option value="">Awaiting Manufacturer...</option>
                </select>
            </div>

            <div class="input-wrapper">
                <label>Engine Output</label>
                <i class="fa-solid fa-bolt"></i>
                <select name="Power_HP" id="power_select" required disabled>
                    <option value="">Awaiting Model...</option>
                </select>
            </div>

            <div class="input-wrapper">
                <label>Current Mileage (km)</label>
                <i class="fa-solid fa-gauge-high"></i>
                <input type="number" name="Mileage_km" placeholder="Ex: 45000" required>
            </div>

            <div class="input-wrapper">
                <label>Years in Service</label>
                <i class="fa-solid fa-calendar-days"></i>
                <input type="number" name="Age" placeholder="Ex: 3" required>
            </div>

            <div class="input-wrapper">
                <label>Transmission Type</label>
                <i class="fa-solid fa-gear"></i>
                <select name="Gearbox">
                    <option value="manuell">Manual Transmission</option>
                    <option value="automatik">Automatic Transmission</option>
                </select>
            </div>

            <div class="input-wrapper">
                <label>Fuel Type</label>
                <i class="fa-solid fa-gas-pump"></i>
                <select name="Fuel_Type" required>
                    <option value="Benzin">Benzin (Petrol)</option>
                    <option value="Diesel">Diesel</option>
                    <option value="Electric">Electric</option>
                    <option value="LPG">LPG / CNG</option>
                </select>
            </div>

            <div class="input-wrapper">
                <label>Body Style</label>
                <i class="fa-solid fa-van-shuttle"></i>
                <select name="Body_Type" required>
                    <option value="limousine">Sedan / Limousine</option>
                    <option value="kombi">Station Wagon</option>
                    <option value="kleinwagen">Compact / Hatchback</option>
                    <option value="suv">SUV</option>
                    <option value="coupe">Coupe</option>
                </select>
            </div>

            <button type="submit" class="btn-submit">
                RUN VALUATION ENGINE <i class="fa-solid fa-microchip"></i>
            </button>
        </div>
    </form>
</div>

<script>
    let carData = {};
    fetch('/static/car_data.json').then(r => r.json()).then(data => {
        carData = data;
        const s = document.getElementById('make_select');
        s.innerHTML = '<option value="">Select Manufacturer</option>';
        Object.keys(data).forEach(m => {
            let o = document.createElement('option');
            o.value = o.innerHTML = m;
            s.appendChild(o);
        });
    });

    function updateModels() {
        const m = document.getElementById('model_select');
        const p = document.getElementById('power_select');
        const mk = document.getElementById('make_select').value;
        m.innerHTML = '<option value="">Select Model</option>';
        m.disabled = false;
        Object.keys(carData[mk]).forEach(mod => {
            let o = document.createElement('option');
            o.value = o.innerHTML = mod;
            m.appendChild(o);
        });
    }

    function updatePower() {
        const p = document.getElementById('power_select');
        const mk = document.getElementById('make_select').value;
        const mod = document.getElementById('model_select').value;
        p.innerHTML = '<option value="">Select Output</option>';
        p.disabled = false;
        carData[mk][mod].forEach(hp => {
            let o = document.createElement('option');
            o.value = hp; o.innerHTML = hp + " HP";
            p.appendChild(o);
        });
    }

    function showLoading() {
        document.getElementById('loading-overlay').style.display = 'flex';
    }
</script>
</body>
</html>
